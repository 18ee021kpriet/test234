              "name": "TCP_PORT",
              "value": "{{workflow.parameters.tcp-port}}"
            }
          ],
          "resources": {
            "limits": {
              "cpu": "2",
              "memory": "4Gi"
            },
            "requests": {
              "cpu": "1",
              "memory": "2Gi"
            }
          },
          "source": "$scriptPath = '/tmp/Install-SQL-Server.ps1'\nWrite-Host 'Downloading Install-SQL-Server.ps1...'\nInvoke-WebRequest -Uri $env:SCRIPT_URL -OutFile $scriptPath -UseBasicParsing\nWrite-Host 'Download complete.'\nWrite-Host 'Starting SQL Server installation...'\n& $scriptPath -SAPassword $env:SA_PASSWORD -Edition $env:SQL_EDITION -InstallPath $env:INSTALL_PATH -DataPath $env:DATA_PATH -InstanceName $env:INSTANCE_NAME -TcpPort $env:TCP_PORT\nif ($LASTEXITCODE -ne 0) {\n  Write-Error \"Installation failed with exit code $LASTEXITCODE\"\n  exit $LASTEXITCODE\n}\nWrite-Host 'SQL Server installation completed successfully.'"
        },
        "activeDeadlineSeconds": 1800,
        "retryStrategy": {
          "limit": "2",
          "retryPolicy": "OnFailure"
        }
      }
    ],
